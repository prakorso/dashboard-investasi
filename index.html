<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Wealth Management</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --bg:#08090b;--bg1:#0e1014;--bg2:#14161c;--bg3:#1c1f28;--bg4:#242834;
  --border:rgba(255,255,255,.05);--border2:rgba(255,255,255,.10);--border3:rgba(255,255,255,.18);
  --t1:#f0f2f7;--t2:#8892a4;--t3:#4a5268;
  --gold:#d4a84b;--gold2:#f0c96b;--gold-bg:rgba(212,168,75,.10);--gold-bd:rgba(212,168,75,.25);
  --teal:#2dd4bf;--teal-bg:rgba(45,212,191,.10);--teal-bd:rgba(45,212,191,.25);
  --rose:#fb7185;--rose-bg:rgba(251,113,133,.10);--rose-bd:rgba(251,113,133,.25);
  --violet:#a78bfa;--violet-bg:rgba(167,139,250,.10);--violet-bd:rgba(167,139,250,.25);
  --green:#4ade80;--green-bg:rgba(74,222,128,.10);--green-bd:rgba(74,222,128,.25);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.10);--blue-bd:rgba(96,165,250,.25);
  --r:10px;--r2:14px;--r3:20px;
  --font:'Inter',sans-serif;--display:'Inter',sans-serif;--mono:'IBM Plex Mono',monospace;
  --shadow:0 20px 60px rgba(0,0,0,.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--t1);font-family:var(--font);min-height:100vh;overflow-x:hidden}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;
  background:radial-gradient(ellipse at 30% 0%,rgba(212,168,75,.08) 0%,transparent 55%),
             radial-gradient(ellipse at 70% 100%,rgba(45,212,191,.05) 0%,transparent 50%)}
.lbox{background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r3);padding:44px 40px;width:100%;max-width:400px;box-shadow:var(--shadow)}
.lbox-logo{font-family:var(--font);font-size:22px;font-weight:700;color:var(--gold);letter-spacing:-.3px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.lbox-sub{font-size:13px;color:var(--t3);margin-bottom:32px}
.lfg label{font-size:11px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:6px}
.lfg input{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:12px 14px;color:var(--t1);font-size:14px;font-family:var(--font);outline:none;transition:border-color .15s;margin-bottom:16px}
.lfg input:focus{border-color:var(--gold)}
.lbtn{width:100%;background:var(--gold);color:#000;border:none;border-radius:var(--r);padding:14px;font-size:14px;font-weight:700;font-family:var(--font);letter-spacing:0;cursor:pointer;transition:all .15s}
.lbtn:hover{background:var(--gold2);transform:translateY(-1px)}
.lerr{background:var(--rose-bg);border:1px solid var(--rose-bd);color:var(--rose);border-radius:var(--r);padding:10px 14px;font-size:12px;margin-top:12px;display:none;text-align:center}

/* ── APP LAYOUT ── */
#app{display:none;min-height:100vh}
.layout{display:flex;min-height:100vh}

/* ── SIDEBAR ── */
.sidebar{width:220px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.sidebar-logo{padding:24px 20px 20px;font-family:var(--display);font-size:20px;font-weight:800;color:var(--gold);letter-spacing:-.3px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.nav{flex:1;padding:16px 10px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:500;color:var(--t3);transition:all .15s;margin-bottom:2px;border:1px solid transparent}
.nav-item:hover{background:var(--bg2);color:var(--t1)}
.nav-item.active{background:var(--gold-bg);border-color:var(--gold-bd);color:var(--gold)}
.nav-item i{font-size:16px;flex-shrink:0}
.nav-section{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;padding:12px 12px 6px;opacity:.6}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);cursor:pointer;transition:all .15s}
.user-info:hover{background:var(--bg2)}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--teal));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#000;flex-shrink:0}
.user-name{font-size:13px;font-weight:500;color:var(--t2)}
.user-role{font-size:10px;color:var(--t3)}

/* ── MAIN CONTENT ── */
.main{flex:1;margin-left:220px;min-height:100vh;display:flex;flex-direction:column}
.topbar{padding:16px 28px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:50;backdrop-filter:blur(10px)}
.page-title{font-family:var(--font);font-size:16px;font-weight:600;letter-spacing:0}
.page-sub{font-size:11px;color:var(--t3);margin-top:2px}
.topbar-r{display:flex;align-items:center;gap:8px}
.content{padding:24px 28px 80px;flex:1}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--font);border:1px solid var(--border2);background:var(--bg2);color:var(--t2);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg3);color:var(--t1);border-color:var(--border3)}
.btn-gold{background:var(--gold);color:#000;border-color:transparent;font-weight:700}
.btn-gold:hover{background:var(--gold2);color:#000}
.btn-teal{background:var(--teal-bg);color:var(--teal);border-color:var(--teal-bd)}
.btn-teal:hover{background:var(--teal);color:#000}
.btn-rose{background:var(--rose-bg);color:var(--rose);border-color:var(--rose-bd)}
.btn-rose:hover{background:var(--rose);color:#fff}
.btn-ghost{background:transparent;border-color:transparent;padding:6px 8px}
.btn-ghost:hover{background:var(--bg2)}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-xs{padding:4px 7px;font-size:11px}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.btn i{font-size:14px}

/* ── CARDS ── */
.card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.card-title{font-family:var(--font);font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:8px}

/* ── STAT CARDS ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px;position:relative;overflow:hidden;transition:border-color .2s}
.stat:hover{border-color:var(--border3)}
.stat::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .2s}
.stat.gold::before{background:linear-gradient(135deg,rgba(212,168,75,.05),transparent)}
.stat.teal::before{background:linear-gradient(135deg,rgba(45,212,191,.05),transparent)}
.stat.rose::before{background:linear-gradient(135deg,rgba(251,113,133,.05),transparent)}
.stat.violet::before{background:linear-gradient(135deg,rgba(167,139,250,.05),transparent)}
.stat:hover::before{opacity:1}
.stat-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.stat-val{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--t1);line-height:1.3;word-break:break-word;overflow-wrap:anywhere}
.stat-val.gold{color:var(--gold)}
.stat-val.teal{color:var(--teal)}
.stat-val.rose{color:var(--rose)}
.stat-val.green{color:var(--green)}
.stat-hint{font-size:11px;color:var(--t3);margin-top:5px}

/* ── CHIP ── */
.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
.chip.up{background:var(--green-bg);color:var(--green)}
.chip.dn{background:var(--rose-bg);color:var(--rose)}
.chip.neu{background:var(--bg3);color:var(--t3)}
.chip.gold{background:var(--gold-bg);color:var(--gold)}
.chip.teal{background:var(--teal-bg);color:var(--teal)}
.chip.violet{background:var(--violet-bg);color:var(--violet)}

/* ── PROGRESS BAR ── */
.pbar-wrap{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden;margin:6px 0}
.pbar-fill{height:100%;border-radius:4px;transition:width .6s ease}

/* ── FORMS ── */
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
input,select,textarea{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 12px;color:var(--t1);font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--gold)}
input::placeholder{color:var(--t3)}
select option{background:var(--bg2)}
textarea{resize:vertical;min-height:70px}
.fgrid{display:grid;gap:10px}
.fgrid-2{grid-template-columns:1fr 1fr}
.fgrid-3{grid-template-columns:1fr 1fr 1fr}
.fgrid-4{grid-template-columns:1fr 1fr 1fr 1fr}
.fspan{grid-column:1/-1}

/* ── TOAST ── */
.toast{border-radius:var(--r);padding:10px 14px;font-size:12px;font-weight:500;margin-top:10px;display:none;align-items:center;gap:8px}
.toast.ok{background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);display:flex}
.toast.err{background:var(--rose-bg);border:1px solid var(--rose-bd);color:var(--rose);display:flex}
.toast.warn{background:var(--gold-bg);border:1px solid var(--gold-bd);color:var(--gold);display:flex}

/* ── TABLE ── */
.tbl-wrap{border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.tbl-scroll{overflow-x:auto;overflow-y:auto;max-height:360px;scrollbar-width:thin}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{background:var(--bg2);color:var(--t3);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:2;white-space:nowrap}
tbody td{padding:10px 14px;border-top:1px solid var(--border);color:var(--t1);vertical-align:middle}
tbody tr:hover td{background:rgba(255,255,255,.02)}
.td-mono{font-family:var(--mono);font-size:11px}
.td-act{display:flex;gap:4px;justify-content:flex-end}

/* ── DIVIDER ── */
hr.dv{border:none;border-top:1px solid var(--border);margin:20px 0}
.info-note{background:var(--bg2);border-radius:var(--r);padding:9px 13px;font-size:11px;color:var(--t2);display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.section-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}

/* ── NET WORTH HERO ── */
.nw-hero{background:linear-gradient(135deg,var(--bg1),rgba(212,168,75,.03));border:1px solid var(--gold-bd);border-radius:var(--r3);padding:28px 32px;margin-bottom:20px;position:relative;overflow:hidden}
.nw-hero::after{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(212,168,75,.06),transparent 70%);pointer-events:none}
.nw-lbl{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.nw-amount{font-family:var(--mono);font-size:30px;font-weight:600;color:var(--t1);letter-spacing:-1px;line-height:1;margin-bottom:10px}
.nw-amount span{color:var(--gold)}
.nw-row{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:16px}
.nw-row .item{font-size:12px;color:var(--t2)}
.nw-row .item strong{color:var(--t1);font-family:var(--mono)}
.progress-to-target{margin-top:4px}
.progress-lbl{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:5px}
.progress-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:3px;transition:width .8s ease}

/* ── OVERVIEW GRID ── */
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
.ov-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);padding:20px}

/* ── CHART ── */
.chart-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:14px}
.chart-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.chart-title{font-family:var(--font);font-size:13px;font-weight:600;color:var(--t1)}
.chart-sub{font-size:11px;color:var(--t3);margin-top:2px}
.chart-wrap{position:relative}
.filter-row{display:flex;gap:5px}
.fbtn{padding:4px 10px;font-size:11px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--t3);cursor:pointer;font-family:var(--font);transition:all .15s}
.fbtn:hover,.fbtn.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:600}

/* ── CASHFLOW FORM ── */
.tx-form-card{background:var(--bg1);border:1px solid var(--border);border-radius:var(--r2);padding:20px;margin-bottom:14px}
.tx-type-tabs{display:flex;gap:6px;margin-bottom:16px}
.tx-type-btn{flex:1;padding:9px;border-radius:var(--r);border:1px solid var(--border2);background:transparent;font-size:12px;font-weight:600;font-family:var(--display);cursor:pointer;color:var(--t3);transition:all .15s;text-align:center;letter-spacing:.02em}
.tx-type-btn.pengeluaran.active{background:var(--rose-bg);border-color:var(--rose-bd);color:var(--rose)}
.tx-type-btn.pemasukan.active{background:var(--green-bg);border-color:var(--green-bd);color:var(--green)}
.tx-type-btn.tabungan.active{background:var(--teal-bg);border-color:var(--teal-bd);color:var(--teal)}

/* ── BUDGET CARD ── */
.budget-cat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:8px}
.budget-cat:last-child{margin-bottom:0}
.budget-cat-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.budget-cat-name{font-weight:600;font-size:13px}
.budget-cat-sub{font-size:11px;color:var(--t3);margin-top:2px}
.budget-nums{font-size:11px;color:var(--t2);margin-bottom:4px;display:flex;justify-content:space-between}

/* ── INVESTASI CARD ── */
.inv-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:16px;margin-bottom:10px}
.inv-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;gap:8px}
.inv-name{font-weight:700;font-size:14px;font-family:var(--display)}
.inv-sub{font-size:11px;color:var(--t3);margin-top:2px}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px}
.metric{background:var(--bg1);border-radius:var(--r);padding:10px 12px}
.metric-lbl{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.metric-val{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--t1);word-break:break-word}
.metric-val.up{color:var(--green)}
.metric-val.dn{color:var(--rose)}
.metric-val.gold{color:var(--gold)}

/* ── GOALS ── */
.goal-item{display:flex;align-items:flex-start;gap:12px;padding:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:8px;transition:all .2s}
.goal-item.done{opacity:.55}
.goal-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border3);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:1px}
.goal-check.checked{background:var(--gold);border-color:var(--gold);color:#000}
.goal-text{flex:1}
.goal-title{font-weight:600;font-size:13px;margin-bottom:3px}
.goal-info{font-size:11px;color:var(--t3)}
.goal-meta{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
.overlay.open{display:flex}
.modal{background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r3);padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-family:var(--font);font-size:15px;font-weight:600}

/* ── MOBILE TOPBAR ── */
.mobile-topbar{display:none;padding:14px 16px;align-items:center;gap:12px;border-bottom:1px solid var(--border);background:var(--bg1);position:sticky;top:0;z-index:100}
.hamburger{background:transparent;border:none;color:var(--t1);cursor:pointer;padding:4px}
.hamburger i{font-size:20px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99}
.sidebar-overlay.open{display:block}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .mobile-topbar{display:flex}
  .topbar{display:none}
  .content{padding:16px 14px 80px}
  .nw-amount{font-size:30px}
  .ov-grid{grid-template-columns:1fr}
  .alloc-grid{grid-template-columns:1fr!important}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .fgrid-4{grid-template-columns:1fr 1fr}
  .fgrid-3{grid-template-columns:1fr 1fr}
  .fgrid-4 .fspan,.fgrid-3 .fspan{grid-column:1/-1}
  .card-title{flex-wrap:wrap;gap:8px}
  .card-title .btn{font-size:11px}
}
@media(max-width:480px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .nw-amount{font-size:24px;letter-spacing:-1px}
  .fgrid-2,.fgrid-3,.fgrid-4{grid-template-columns:1fr}
  .metrics-grid{grid-template-columns:1fr 1fr}
  .stat-val{font-size:14px}
  .nw-row{flex-wrap:wrap;gap:8px}
  .content{padding:14px 10px 80px}
  table{font-size:11px}
  th,td{padding:7px 6px}
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page-anim{animation:fadeIn .2s ease}
</style>
</head>
<body>

<!-- ═══ LOGIN ═══════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="lbox">
    <div class="lbox-logo">💼 Wealth Management</div>
    <div class="lbox-sub">Personal Finance Dashboard</div>
    <div class="lfg">
      <label>Password</label>
      <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="lbtn" id="l-btn" onclick="doLogin()">Masuk <i class="ti ti-arrow-right" style="font-size:14px"></i></button>
    <div id="l-err" class="lerr"></div>
  </div>
</div>

<!-- ═══ APP ═════════════════════════════════════════════════ -->
<div id="app">

  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sb-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-logo" style="font-size:15px;font-weight:700;letter-spacing:0">💼 Wealth Management</div>

function fmtTgl(raw){
  if(!raw) return '';
  const s = String(raw).trim();
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)) return s;
  if(/^\d{4}-\d{2}-\d{2}/.test(s)){
    const d=new Date(s);
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  }
  const d = new Date(s);
  if(!isNaN(d.getTime())) return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  return s;
}

function tglToISO(tgl){
  if(!tgl) return '';
  const s = String(tgl).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s;
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){
    const [d,m,y] = s.split('/');
    return `${y}-${m}-${d}`;
  }
  return s;
}

function showToast(id,msg,type,ms=4000){

  el.innerHTML=`<i class="ti ti-${type==='ok'?'circle-check':type==='warn'?'alert-triangle':'circle-x'}"></i> ${msg}`;
  el.className='toast '+type;
  clearTimeout(el._t); el._t=setTimeout(()=>el.className='toast',ms);
}

function calcDCA(){
  let inv=0,qty=0;
  STATE.btcDca.forEach(t=>{ qty+=t.beli/t.harga; inv+=t.beli; });
  const avg = inv/qty;
  const cur = STATE.btcPrice?qty*STATE.btcPrice:null;
  const pnl = cur!=null?cur-inv:null;
  const ret = pnl!=null?pnl/inv*100:null;
  return {inv,qty,avg,cur,pnl,ret};
}

function isSellTx(inv){ return String(inv.catatan||'').startsWith('JUAL|'); }
function parseSellFee(inv){ const m=String(inv.catatan||'').match(/fee:(\d+)/); return m?parseInt(m[1]):0; }

function calcPortfolio(){
  const byKode={};
  STATE.investasi.forEach(inv=>{
    const k=inv.kode;
    if(!byKode[k]) byKode[k]={kode:k,tipe:inv.tipe,txs:[]};
    byKode[k].txs.push(inv);
  });
  return Object.values(byKode).map(p=>{
    const mul=p.tipe==='Saham'?100:1;
    const sorted=[...p.txs].sort((a,b)=>tglToISO(a.tanggal).localeCompare(tglToISO(b.tanggal)));
    let totalCost=0,totalQty=0,realizedPnl=0;
    sorted.forEach(tx=>{
      const qty=(tx.lotQty||0)*mul;
      if(!isSellTx(tx)){
        totalCost+=tx.modal||(qty*(tx.hargaBeli||0));
        totalQty+=qty;
      }else{
        const fee=parseSellFee(tx);
        const avgC=totalQty>0?totalCost/totalQty:0;
        const qs=Math.min(qty,totalQty);
        const proc=tx.modal||(qty*(tx.hargaBeli||0));
        realizedPnl+=proc-avgC*qs-fee;
        totalQty=Math.max(0,totalQty-qs);
        totalCost=totalQty*avgC;
      }
    });
    const modal=totalCost; const lotQty=totalQty/mul;
    let live=null;
    if(p.tipe==='Saham') live=STATE.sahamLive[p.kode]||null;
    if(p.tipe==='Crypto') live=p.kode==='BTC'?STATE.btcPrice:(STATE.sahamLive[p.kode]||null);
    const cur=live!=null?totalQty*live:null;
    const unrealizedPnl=cur!=null?cur-modal:null;
    const ret=unrealizedPnl!=null&&modal>0?unrealizedPnl/modal*100:null;
    const avgBeli=totalQty>0?totalCost/totalQty:0;
    return {...p,modal,lotQty,live,cur,pnl:unrealizedPnl,unrealizedPnl,realizedPnl,ret,avgBeli,totalQty};
  });
}

function calcNetWorth(){
  const dca     = calcDCA();
  const port    = calcPortfolio();
  const portVal = port.reduce((a,p)=>a+(p.cur||p.modal),0);
  const dcaVal  = dca.cur||dca.inv;
  const asetVal = STATE.aset.filter(a=>a.kategori!=='Bisnis').reduce((a,x)=>a+(x.nilaiSaatIni||x.modal),0);
  // Nilai bisnis: utamakan data sync Perkasa (modal aktif) supaya konsisten walau STATE.aset telat update.
  // Aset bisnis manual lain (selain Perkasa Motors) tetap dijumlah.
  const asetBisnisManual = STATE.aset.filter(a=>a.kategori==='Bisnis' && a.nama!=='Perkasa Motors').reduce((a,x)=>a+(x.nilaiSaatIni||x.modal),0);
  const perkasaVal = (STATE.perkasa && STATE.perkasa.modalAktif)
    ? STATE.perkasa.modalAktif
    : STATE.aset.filter(a=>a.kategori==='Bisnis' && a.nama==='Perkasa Motors').reduce((a,x)=>a+(x.nilaiSaatIni||x.modal),0);
  const bisnisVal = asetBisnisManual + perkasaVal;
  const totalInv = portVal + dcaVal;
  const totalAset = totalInv + asetVal + bisnisVal;
  const totalHutang = (STATE.liabilities||[]).reduce((a,l)=>a+(l.sisaPokok||0),0);
  const netWorth = totalAset - totalHutang;
  return {netWorth,totalInv,portVal,dcaVal,asetVal,bisnisVal,totalAset,totalHutang};
}

// ── Asset Allocation by macro category (Cash/Stocks/Crypto/Business/Property) ──
function calcAssetAllocation(){
  const dca  = calcDCA();

  const nw   = calcNetWorth();
  const cash    = (typeof calcAvailableCash==='function') ? Math.max(0,calcAvailableCash()) : 0;

  const business= nw.bisnisVal; // konsisten dengan Net Worth (termasuk Perkasa sync)
  // Property & real assets (non-investment, non-business)
  const propCats = ['Tanah','Rumah','Kost','Kendaraan','Emas Fisik','Piutang','Deposito','Properti','Lainnya'];
  const property= STATE.aset.filter(a=>propCats.includes(a.kategori)).reduce((a,x)=>a+(x.nilaiSaatIni||x.modal),0);
  // Investment instruments (reksa dana, obligasi, emas) → masuk ke "Others"
  const others  = STATE.aset.filter(a=>INVEST_ASSET_CATS.includes(a.kategori)).reduce((a,x)=>a+(x.nilaiSaatIni||x.modal),0);

  const segs = [

  ].filter(s=>s.val>0);

function calcCashflowMonth(bulan,tahun){
  // Financial Period: pakai periodeBulan/periodeTahun kalau ada, fallback ke bulan/tahun (transaction date)
  const txs = STATE.transactions.filter(t=>{
    const pBln = t.periodeBulan || t.bulan;
    const pThn = t.periodeTahun || t.tahun;
    return pBln===bulan && pThn===tahun;
  });
  const income  = txs.filter(t=>t.tipe==='pemasukan').reduce((a,t)=>a+t.nominal,0);
  const spend   = txs.filter(t=>t.tipe==='pengeluaran').reduce((a,t)=>a+t.nominal,0);
  const saving  = txs.filter(t=>t.tipe==='tabungan').reduce((a,t)=>a+t.nominal,0);
  return {income,spend,saving,sisa:income-spend-saving,txs};
}

function getBudget(bulan,tahun,kategori){
  return STATE.budget.find(b=>b.bulan===bulan&&b.tahun===tahun&&b.kategori===kategori)?.alokasi||0;
}

  pengeluaran: 'Living Expense,Lifestyle,Bisnis,Cicilan & Tagihan,Lainnya',
  pemasukan:   'Gaji,Bisnis,Investasi,Side Income,Lainnya',

  if(tipe==='pemasukan')   return (cfg.kat_pemasukan||KAT_DEFAULT.pemasukan).split(',').map(s=>s.trim()).filter(Boolean);
  if(tipe==='tabungan')    return (cfg.kat_tabungan||KAT_DEFAULT.tabungan).split(',').map(s=>s.trim()).filter(Boolean);
  return [];
}

function getRekening(){
  // Dynamic accounts: dari config.akun_list (JSON) atau fallback rekening lama
  try{
    const list = JSON.parse(STATE.config.akun_list||'[]');

const BULAN_LIST = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

function periodeOptions(selBln,selThn){
  // Generate periode options dinamis: dari periode transaksi terlama s/d 12 bulan ke depan
  const now = new Date();
  const seen = {};
  const opts = [];

  // Kumpulkan semua tahun dari transaksi yang ada supaya periode lama tetap muncul
  let minDate = new Date(now.getFullYear(), now.getMonth()-3, 1);
  STATE.transactions.forEach(t=>{
    const b = t.periodeBulan || t.bulan;
    const y = parseInt(t.periodeTahun || t.tahun);
    const mi = BULAN_LIST.indexOf(b);
    if(mi>=0 && y){ const d = new Date(y, mi, 1); if(d<minDate) minDate = d; }
  });

  // Range: dari minDate s/d 12 bulan ke depan dari sekarang
  const endDate = new Date(now.getFullYear(), now.getMonth()+12, 1);
  const cursor  = new Date(minDate);
  while(cursor <= endDate){
    const bln = cursor.toLocaleString('id-ID',{month:'long'});
    const thn = cursor.getFullYear();
    const val = bln+'|'+thn;
    if(!seen[val]){
      seen[val] = true;
      const sel = (bln===selBln && String(thn)===String(selThn))?' selected':'';
      opts.push(`<option value="${val}"${sel}>${bln} ${thn}</option>`);
    }
    cursor.setMonth(cursor.getMonth()+1);
  }

  // Pastikan periode yang sedang dipilih selalu ada di list (kalau di luar range)
  if(selBln && selThn){
    const selVal = selBln+'|'+selThn;
    if(!seen[selVal]){
      opts.push(`<option value="${selVal}" selected>${selBln} ${selThn}</option>`);
    }
  }

  return opts.join('');
}

function syncPeriode(){
  // Saat tanggal berubah, default periode ikut bulan tanggal (user bisa override)
  const tgl = document.getElementById('tx-tgl')?.value;
  if(!tgl) return;
  const d = new Date(tgl);
  const bln = d.toLocaleString('id-ID',{month:'long'});
  const thn = d.getFullYear();
  const sel = document.getElementById('tx-periode');
  if(sel) sel.value = bln+'|'+thn;
}

function saveSnapshot(){
  if(!STATE.btcPrice) return;
  const nw = calcNetWorth();
  const todayStr = today();
  const snaps = lsgj(K.SNAP,[]);
  const entry = {date:todayStr,...nw};
  const ei = snaps.findIndex(s=>s.date===todayStr);
  if(ei>-1) snaps[ei]=entry; else snaps.push(entry);
  STATE.snapshots = snaps.sort((a,b)=>a.date.localeCompare(b.date)).slice(-365);
  lssj(K.SNAP,STATE.snapshots);
  callSheet({action:'saveSnapshot',date:todayStr,...nw}).catch(()=>{});
}

function pageBudget(){
  const bln = nowMonth(); const thn = nowYear();
  const cf  = calcCashflowMonth(bln,thn);

  // Macro categories dengan target % (disimpan di config.alokasi_plan JSON)
  let plan;
  try{ plan = JSON.parse(STATE.config.alokasi_plan||'null'); }catch(e){ plan=null; }
  if(!plan) plan = [
    {kategori:'Living Expense', persen:30, warna:'var(--rose)'},
    {kategori:'Investment',     persen:40, warna:'var(--gold)'},
    {kategori:'Business',       persen:20, warna:'var(--violet)'},
    {kategori:'Cash Reserve',   persen:10, warna:'var(--teal)'},
  ];

  const totalPersen = plan.reduce((a,p)=>a+p.persen,0);
  const baseIncome  = cf.income>0?cf.income:0;

  // Realisasi per kategori macro (mapping dari tipe transaksi)
  function realisasiMacro(kat){
    const inP = t => (t.periodeBulan||t.bulan)===bln && (t.periodeTahun||t.tahun)===thn;
    if(kat==='Living Expense') return STATE.transactions.filter(t=>inP(t)&&t.tipe==='pengeluaran'&&['Living Expense','Lifestyle','Cicilan & Tagihan'].includes(t.kategori)).reduce((a,t)=>a+t.nominal,0);
    if(kat==='Investment')     return STATE.transactions.filter(t=>inP(t)&&t.tipe==='tabungan'&&t.kategori==='Investasi').reduce((a,t)=>a+t.nominal,0);
    if(kat==='Business')       return STATE.transactions.filter(t=>inP(t)&&(t.kategori==='Bisnis')).reduce((a,t)=>a+t.nominal,0);
    if(kat==='Cash Reserve')   return STATE.transactions.filter(t=>inP(t)&&t.tipe==='tabungan'&&['Dana Darurat','Transfer Antar Rekening'].includes(t.kategori)).reduce((a,t)=>a+t.nominal,0);
    return 0;
  }

  const cards = plan.map((p,i)=>{
    const target = baseIncome*p.persen/100;
    const real   = realisasiMacro(p.kategori);
    const pct    = target>0?Math.min(100,real/target*100):0;
    return `
    <div class="budget-cat">
      <div class="budget-cat-hdr">
        <div>
          <div class="budget-cat-name">${p.kategori} <span style="font-size:11px;color:var(--t3);font-weight:400">${p.persen}%</span></div>
          <div class="budget-cat-sub">Target ${fRp(target)} · Realisasi ${fRp(real)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <span class="chip ${pct>100?'dn':pct>80?'gold':'teal'}" style="font-size:10px">${pct.toFixed(0)}%</span>
          <button class="btn btn-ghost btn-xs" onclick="openEditAllocation(${i})" title="Edit"><i class="ti ti-edit" style="font-size:12px"></i></button>
          <button class="btn btn-ghost btn-xs" style="color:var(--rose)" onclick="removeAllocation(${i})" title="Hapus"><i class="ti ti-trash" style="font-size:12px"></i></button>
        </div>
      </div>
      <div class="pbar-wrap"><div class="pbar-fill" style="width:${pct}%;background:${p.warna}"></div></div>
    </div>`;
  }).join('');

  return `
  <div class="stat-grid" style="margin-bottom:16px">
    <div class="stat gold"><div class="stat-lbl">Monthly Income</div><div class="stat-val gold">${fRp(cf.income)}</div><div class="stat-hint">Basis alokasi</div></div>
    <div class="stat ${totalPersen===100?'teal':''}"><div class="stat-lbl">Total Alokasi</div><div class="stat-val ${totalPersen===100?'teal':(totalPersen>100?'rose':'')}">${totalPersen}%</div><div class="stat-hint">${totalPersen===100?'Seimbang':totalPersen>100?'Over 100%':'Sisa '+(100-totalPersen)+'%'}</div></div>
    <div class="stat"><div class="stat-lbl">Available Cash</div><div class="stat-val teal">${fRp(calcAvailableCash())}</div><div class="stat-hint">Saldo rekening</div></div>
    <div class="stat"><div class="stat-lbl">Realisasi Bulan Ini</div><div class="stat-val rose">${fRp(cf.spend+cf.saving)}</div></div>
  </div>

  <div class="card" style="margin-bottom:14px">
    <div class="card-title">
      📊 Capital Allocation Planner
      <button class="btn btn-sm btn-teal" onclick="openAddAllocation()"><i class="ti ti-plus"></i> Tambah Kategori</button>
    </div>
    <div class="info-note" style="margin-bottom:14px"><i class="ti ti-info-circle" style="font-size:13px;flex-shrink:0"></i> Alokasikan income bulanan ke kategori makro berdasarkan persentase. Ini panduan alokasi modal, bukan micro expense tracking.</div>
    ${cards}
  </div>`;
}

function openAddAllocation(){

async function saveNewAllocation(){

  plan.push({kategori:nama,persen,warna:colors[plan.length%colors.length]});

  closeModal(); renderPage('budget');
}

function openEditAllocation(idx){
  const plan = getAllocationPlan();

async function saveEditAllocation(idx){
  const plan = getAllocationPlan();
  const nama = document.getElementById('alc-nama')?.value.trim();
  const persen = parseFloat(document.getElementById('alc-persen')?.value)||0;
  if(!nama||!persen){ showToast('modal-toast','Isi nama dan persentase.','err'); return; }
  plan[idx] = {...plan[idx], kategori:nama, persen};
  await persistAllocation(plan);
  closeModal(); renderPage('budget');
}

async function removeAllocation(idx){
  const plan = getAllocationPlan();
  if(!confirm('Hapus kategori "'+plan[idx].kategori+'"?')) return;
  plan.splice(idx,1);
  await persistAllocation(plan);
  renderPage('budget');
}

// ─── PORTFOLIO (read-only summary) ───────────────────────────
// Kategori aset yang dihitung sebagai investasi (masuk Portfolio)
const INVEST_ASSET_CATS = ['Reksa Dana','Reksadana','Obligasi','ETF','Emas','Emas Digital'];

function calcPortfolioSummary(){
  // 1. BTC DCA
  const dca = calcDCA();
  const segments = [];
  segments.push({label:'BTC DCA', tipe:'BTC', modal:dca.inv, nilai:dca.cur||dca.inv, pnl:dca.pnl||0, ret:dca.ret, color:'#d4a84b'});

  // 2. Crypto + Saham dari calcPortfolio (investasi sheet)
  const port = calcPortfolio();
  port.forEach(p=>{
    const color = p.tipe==='Saham' ? '#60a5fa' : (p.kode==='BTC'?'#c07800':'#a78bfa');
    segments.push({label:p.kode, tipe:p.tipe, modal:p.modal, nilai:p.cur||p.modal, pnl:p.pnl||0, ret:p.ret, color});
  });

  // 3. Investment-type assets dari Aset sheet (reksa dana, obligasi, emas)
  STATE.aset.filter(a=>INVEST_ASSET_CATS.includes(a.kategori)).forEach(a=>{
    const nilai = a.nilaiSaatIni||a.modal;
    const pnl = nilai - a.modal;
    const ret = a.modal>0?pnl/a.modal*100:0;
    segments.push({label:a.nama, tipe:a.kategori, modal:a.modal, nilai, pnl, ret, color:'#4ade80'});
  });

  const totalModal = segments.reduce((s,x)=>s+x.modal,0);
  const totalNilai = segments.reduce((s,x)=>s+x.nilai,0);
  const totalPnl   = totalNilai-totalModal;
  const totalRet   = totalModal>0?totalPnl/totalModal*100:0;

  // Breakdown by tipe
  const byTipe = {};
  segments.forEach(s=>{
    const key = ['BTC','Crypto'].includes(s.tipe)?(s.tipe==='BTC'?'Bitcoin':'Crypto'):(s.tipe==='Saham'?'Saham':s.tipe);
    if(!byTipe[key]) byTipe[key]={tipe:key,modal:0,nilai:0,color:s.color};
    byTipe[key].modal+=s.modal; byTipe[key].nilai+=s.nilai;
  });

  const totalRealized = port.reduce((s,p)=>s+(p.realizedPnl||0),0);
  return {segments, totalModal, totalNilai, totalPnl, totalRet, totalRealized, byTipe:Object.values(byTipe)};
}

function pagePortfolio(){
  const P = calcPortfolioSummary();

  const breakdownRows = P.byTipe.map(b=>{
    const pnl = b.nilai-b.modal;
    const ret = b.modal>0?pnl/b.modal*100:0;
    const pctAlokasi = P.totalNilai>0?(b.nilai/P.totalNilai*100):0;

// Charts untuk portfolio
function renderPortfolioCharts(){
  const P = calcPortfolioSummary();
  // Pie alokasi
  const pieCtx = document.getElementById('ch-port-alloc')?.getContext('2d');
  if(pieCtx){
    const segs = P.byTipe.filter(b=>b.nilai>0);
    if(CHARTS.portAlloc) CHARTS.portAlloc.destroy();
    CHARTS.portAlloc = new Chart(pieCtx,{
      type:'doughnut',
      data:{labels:segs.map(s=>s.tipe),datasets:[{data:segs.map(s=>s.nilai),backgroundColor:segs.map(s=>s.color),borderWidth:2,borderColor:'#0e1014'}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{color:'#8892a4',font:{size:11},padding:10}},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${fRp(ctx.raw)} (${P.totalNilai>0?(ctx.raw/P.totalNilai*100).toFixed(1):0}%)`}}}}
    });
  }
  // Performance — pakai snapshot totalInvestasi
  const perfCtx = document.getElementById('ch-port-perf')?.getContext('2d');
  const emptyEl = document.getElementById('port-perf-empty');
  if(perfCtx){
    const data = STATE.snapshots.filter(s=>s.totalInvestasi>0);
    if(!data.length){ if(emptyEl){emptyEl.style.display='block';perfCtx.canvas.style.display='none';} }
    else{
      if(emptyEl) emptyEl.style.display='none'; perfCtx.canvas.style.display='block';
      if(CHARTS.portPerf) CHARTS.portPerf.destroy();
      const grad=perfCtx.createLinearGradient(0,0,0,240);
      grad.addColorStop(0,'rgba(212,168,75,.15)'); grad.addColorStop(1,'rgba(212,168,75,0)');
      CHARTS.portPerf=new Chart(perfCtx,{
        type:'line',
        data:{labels:data.map(s=>{const d=new Date(s.date);return d.toLocaleDateString('id-ID',{day:'numeric',month:'short'});}),
          datasets:[{label:'Nilai Investasi',data:data.map(s=>s.totalInvestasi),borderColor:'#d4a84b',backgroundColor:grad,borderWidth:2.5,pointRadius:data.length>60?0:3,tension:.35,fill:true}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#4a5268',maxTicksLimit:8,font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},y:{ticks:{color:'#4a5268',callback:v=>'Rp'+Math.round(v/1e6)+'jt'},grid:{color:'rgba(255,255,255,.04)'}}}}
      });
    }
  }
}

    }

}

// ── Commitment actions ──────────────────────────────────────
async function submitCommitment(){
  const due  = document.getElementById('cm-due')?.value;
  const desk = document.getElementById('cm-desk')?.value.trim();
  const nom  = parseFloat(document.getElementById('cm-nom')?.value)||0;
  const kat  = document.getElementById('cm-kat')?.value;
  if(!due||!desk||!nom){ showToast('cm-toast','Lengkapi due date, deskripsi, dan nominal.','err'); return; }
  const c = {id:'cm_'+Date.now(), dueDate:fmtTgl(due), deskripsi:desk, nominal:nom, kategori:kat, status:'pending'};
  STATE.commitments.push(c);
  renderPage('kewajiban');
  const ok = await callSheet({action:'addCommitment',...c});
  showToast('cm-toast', ok.success?'✓ Tersimpan ke Sheets!':'⚠ Tersimpan lokal', ok.success?'ok':'warn');
}

async function toggleCommitment(id){
  const c = STATE.commitments.find(x=>x.id===id);
  if(!c) return;
  c.status = c.status==='lunas'?'pending':'lunas';
  renderPage('kewajiban');
  await callSheet({action:'updateCommitment',id,status:c.status});
}

function editCommitment(id){
  const c = STATE.commitments.find(x=>x.id===id);
  if(!c) return;
  const kategoriOpts = ['Gaji Karyawan','Pajak','Maintenance','Cicilan','Vendor','Tagihan Rutin','Sewa','Lainnya'];
  // dueDate bisa format dd/mm/yyyy → ubah ke yyyy-mm-dd untuk input date
  let dueVal = c.dueDate;
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(c.dueDate)){ const [d,m,y]=c.dueDate.split('/'); dueVal=y+'-'+m+'-'+d; }
  document.getElementById('modal-title').textContent='Edit Kewajiban';
  document.getElementById('modal-body').innerHTML=`
    <div class="fgrid fgrid-2" style="margin-bottom:10px">
      <div class="fg"><label>Due Date</label><input type="date" id="ecm-due" value="${dueVal}"/></div>
      <div class="fg"><label>Nominal (Rp)</label><input type="number" id="ecm-nom" value="${c.nominal}"/></div>
    </div>
    <div class="fgrid fgrid-2" style="margin-bottom:14px">
      <div class="fg"><label>Deskripsi</label><input type="text" id="ecm-desk" value="${c.deskripsi||''}"/></div>
      <div class="fg"><label>Kategori</label><select id="ecm-kat">${kategoriOpts.map(k=>`<option${k===c.kategori?' selected':''}>${k}</option>`).join('')}</select></div>
    </div>
    <button class="btn btn-gold btn-full" onclick="saveEditCommitment('${id}')">Simpan</button>`;
  openModal();
}

async function saveEditCommitment(id){
  const c = STATE.commitments.find(x=>x.id===id);
  if(!c) return;
  const due  = document.getElementById('ecm-due')?.value;
  const desk = document.getElementById('ecm-desk')?.value.trim();
  const nom  = parseFloat(document.getElementById('ecm-nom')?.value)||0;
  const kat  = document.getElementById('ecm-kat')?.value;
  if(!due||!desk||!nom){ showToast('modal-toast','Lengkapi semua field.','err'); return; }
  c.dueDate=fmtTgl(due); c.deskripsi=desk; c.nominal=nom; c.kategori=kat;
  closeModal(); renderPage('kewajiban');
  const ok = await callSheet({action:'updateCommitment',id,dueDate:c.dueDate,deskripsi:desk,nominal:nom,kategori:kat,status:c.status});
  showToast('cm-toast', ok.success?'✓ Tersimpan!':'⚠ Update lokal', ok.success?'ok':'warn');
}

async function deleteCommitment(id){
  if(!confirm('Hapus kewajiban ini?')) return;
  STATE.commitments = STATE.commitments.filter(x=>x.id!==id);
  renderPage('kewajiban');
  await callSheet({action:'deleteCommitment',id});
}

function renderPerkasaChart(){
  const p = STATE.perkasa;
  const ctx = document.getElementById('ch-perkasa-perf')?.getContext('2d');
  const emptyEl = document.getElementById('perkasa-perf-empty');
  if(!ctx) return;
  const hist = (p && p.history) ? p.history.slice().filter(h=>h.tglJual) : [];
  if(!hist.length){ if(emptyEl){emptyEl.style.display='block';ctx.canvas.style.display='none';} return; }
  if(emptyEl) emptyEl.style.display='none'; ctx.canvas.style.display='block';
  hist.sort((a,b)=>String(a.tglJual).localeCompare(String(b.tglJual)));
  let cum=0; const labels=[],data=[];
  hist.forEach(h=>{ cum+=h.profit; labels.push(new Date(h.tglJual).toLocaleDateString('id-ID',{day:'numeric',month:'short'})); data.push(cum); });
  if(CHARTS.perkasa) CHARTS.perkasa.destroy();
  const grad=ctx.createLinearGradient(0,0,0,240);
  grad.addColorStop(0,'rgba(74,222,128,.15)'); grad.addColorStop(1,'rgba(74,222,128,0)');
  CHARTS.perkasa=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{label:'Profit Kumulatif',data,borderColor:'#4ade80',backgroundColor:grad,borderWidth:2.5,pointRadius:3,tension:.3,fill:true}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'Total: '+fRp(ctx.raw)}}},
      scales:{x:{ticks:{color:'#4a5268',maxTicksLimit:8,font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},
              y:{ticks:{color:'#4a5268',callback:v=>'Rp'+Math.round(v/1e6)+'jt'},grid:{color:'rgba(255,255,255,.04)'}}}}
  });
}

async function syncPerkasa(){
  const btn=document.getElementById('btn-sync-perkasa');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2" style="animation:spin .7s linear infinite"></i> Sync...';}
  try{
    const r = await fetch(`${WEB_URL}?action=syncPerkasa`,{signal:AbortSignal.timeout(30000)});
    const d = await r.json();
    if(d.success && d.perkasa){
      STATE.perkasa = d.perkasa;
      await loadSheet(); // refresh aset bisnis yang auto-updated
      renderPage('bisnis');
      showToast('sync-toast','✓ Sync berhasil! Modal aktif '+fRp(d.perkasa.modalAktif),'ok',5000);
    } else {
      if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-refresh"></i> Sync';}
      showToast('sync-toast','⚠ Gagal sync: '+(d.error||'unknown'),'err',6000);
    }
  }catch(e){
    if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-refresh"></i> Sync';}
    showToast('sync-toast','⚠ Error: '+e.message,'err',6000);
  }
}

function addLiability(){

async function prosesBayarCicilan(id){
  const l=STATE.liabilities.find(x=>x.id===id);
  if(!l) return;
  const bayar=parseFloat(document.getElementById('lb-bayar')?.value)||0;
  const akun=document.getElementById('lb-akun')?.value||'';
  const toCashflow=document.getElementById('lb-tocashflow')?.checked;
  if(!bayar){ showToast('modal-toast','Isi jumlah bayar.','err'); return; }
  // 1. Kurangi sisa pokok utang
  l.sisaPokok=Math.max(0,l.sisaPokok-bayar);
  // 2. Auto-buat transaksi pengeluaran di cashflow (kalau dicentang)
  if(toCashflow){
    const d=new Date();
    const bln=d.toLocaleString('id-ID',{month:'long'});
    const thn=d.getFullYear().toString();
    const tx={id:'tx_'+Date.now(), tanggal:fmtTgl(today()), tipe:'pengeluaran', deskripsi:'Cicilan '+l.nama, kategori:'Cicilan & Tagihan', subkategori:'', nominal:bayar, akun, bulan:bln, tahun:thn, periodeBulan:bln, periodeTahun:thn, catatan:'Auto dari pembayaran utang'};
    STATE.transactions.push(tx);
    callSheet({action:'addTransaction',...tx});
  }
  closeModal(); renderPage('kewajiban');
  await callSheet({action:'updateLiability',id,nama:l.nama,totalPinjaman:l.totalPinjaman,sisaPokok:l.sisaPokok,cicilanBulan:l.cicilanBulan,kreditur:l.kreditur,catatan:l.catatan});
  showToast('kewajiban-toast', toCashflow?'✓ Cicilan dibayar + tercatat di cashflow':'✓ Sisa pokok berkurang', 'ok', 4000);
}

async function deleteLiability(id){
  const l=STATE.liabilities.find(x=>x.id===id);
  if(!confirm('Hapus utang "'+(l?l.nama:'')+'"?')) return;
  STATE.liabilities=STATE.liabilities.filter(x=>x.id!==id);
  renderPage('kewajiban');
  await callSheet({action:'deleteLiability',id});
}

function getFinancialGoals(){
  try{ const g = JSON.parse(STATE.config.financial_goals||'null'); if(g&&g.length) return g; }catch(e){}
  // Default goals — target bisa diedit/ditambah sendiri
  const nw = calcNetWorth();
  return [
    {id:'fg_nw',    nama:'Net Worth Target',        tipe:'networth',  target:1000000000, warna:'var(--gold)'},
    {id:'fg_inv',   nama:'Investment Target',       tipe:'investment',target:500000000,  warna:'var(--teal)'},
    {id:'fg_ef',    nama:'Emergency Fund Target',   tipe:'emergency', target:100000000,  warna:'var(--blue)'},
    {id:'fg_biz',   nama:'Business Valuation Target',tipe:'business', target:200000000,  warna:'var(--violet)'},
  ];
}

function goalCurrentValue(tipe){
  const nw = calcNetWorth();
  if(tipe==='networth')   return nw.netWorth;
  if(tipe==='investment') return nw.totalInv;
  if(tipe==='business')   return nw.bisnisVal;
  if(tipe==='emergency'){
    // Emergency fund = saldo rekening + aset kategori Darurat/Deposito
    const cash = (typeof calcAvailableCash==='function')?calcAvailableCash():0;
    const ef = STATE.aset.filter(a=>['Darurat','Deposito'].includes(a.kategori)).reduce((s,a)=>s+(a.nilaiSaatIni||a.modal),0);
    return cash + ef;
  }
  return 0; // custom → manual (pakai field current)
}

function pageGoals(){
  const goals = getFinancialGoals();
  const cards = goals.map((g,i)=>{
    const current = g.tipe==='custom' ? (g.current||0) : goalCurrentValue(g.tipe);
    const pct = g.target>0 ? Math.min(100, current/g.target*100) : 0;
    const sisa = Math.max(0, g.target-current);
    const done = current>=g.target;
    return `
    <div class="card" style="margin-bottom:12px">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px"><span style="width:10px;height:10px;border-radius:2px;background:${g.warna};display:inline-block"></span>${g.nama}${done?' <span class="chip up" style="font-size:10px">✓ Tercapai</span>':''}</div>
          <div style="font-size:11px;color:var(--t3);margin-top:3px">Target: ${fRp(g.target)}</div>
        </div>
        <div style="display:flex;gap:4px">
          <button class="btn btn-ghost btn-xs" onclick="editFinGoal('${g.id}')" title="Edit"><i class="ti ti-edit"></i></button>
          <button class="btn btn-ghost btn-xs" style="color:var(--rose)" onclick="deleteFinGoal('${g.id}')" title="Hapus"><i class="ti ti-trash"></i></button>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
        <span style="font-family:var(--mono);font-size:18px;font-weight:600;color:${g.warna}">${fRp(current)}</span>
        <span style="font-family:var(--mono);font-size:14px;font-weight:600;color:${g.warna}">${pct.toFixed(1)}%</span>
      </div>
      <div class="pbar-wrap" style="height:10px"><div class="pbar-fill" style="width:${pct}%;background:${g.warna}"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-top:6px">
        <span>${done?'Target tercapai! 🎉':'Sisa '+fRp(sisa)}</span>
        <span>${g.tipe==='custom'?'Manual':'Auto-tracked'}</span>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="info-note" style="margin-bottom:14px"><i class="ti ti-info-circle" style="font-size:13px;flex-shrink:0"></i> Financial Goals melacak progress otomatis dari data dashboard (net worth, investasi, bisnis, emergency fund). Goal custom bisa diupdate manual.</div>

  <div style="display:flex;justify-content:flex-end;margin-bottom:14px">
    <button class="btn btn-gold btn-sm" onclick="addFinGoal()"><i class="ti ti-plus"></i> Tambah Goal</button>
  </div>

  ${goals.length===0?'<div class="card" style="text-align:center;padding:32px;color:var(--t3)">Belum ada financial goals. Klik Tambah Goal.</div>':cards}
  `;
}

function togglePeriode(){
  const wrap = document.getElementById('tx-periode-wrap');
  const btn  = document.getElementById('tx-periode-toggle');
  if(!wrap) return;
  const show = wrap.style.display==='none';
  wrap.style.display = show?'block':'none';
  if(btn) btn.style.color = show?'var(--gold)':'var(--t3)';
}

async function submitTx(){
  const tgl  = document.getElementById('tx-tgl')?.value;
  const nom  = parseFloat(document.getElementById('tx-nom')?.value);
  const kat  = document.getElementById('tx-kat')?.value;
  const akun = document.getElementById('tx-akun')?.value;
  const desk = document.getElementById('tx-desk')?.value||'';
  const periodeVal = document.getElementById('tx-periode')?.value||'';
  if(!tgl||!nom||nom<=0){ showToast('tx-toast','Isi tanggal dan nominal.','err'); return; }
  const fd   = fmtTgl(tgl);
  const d    = new Date(tgl);
  const bln  = d.toLocaleString('id-ID',{month:'long'});
  const thn  = d.getFullYear().toString();
  // Financial period — dari dropdown, fallback ke bulan tanggal
  const [pBln,pThn] = periodeVal.includes('|') ? periodeVal.split('|') : [bln,thn];
  const tx   = {id:'tx_'+Date.now(), tanggal:fd, tipe:currTxType, deskripsi:desk, kategori:kat, subkategori:'', nominal:nom, akun, bulan:bln, tahun:thn, periodeBulan:pBln, periodeTahun:pThn, catatan:''};
  STATE.transactions.push(tx);
  document.getElementById('tx-tgl').value = today();
  document.getElementById('tx-nom').value = '';
  document.getElementById('tx-desk').value = '';
  renderPage('cashflow');
  const ok = await callSheet({action:'addTransaction',...tx});
  showToast('tx-toast', ok.success?'✓ Tersimpan ke Google Sheets!':'⚠ Tersimpan lokal saja', ok.success?'ok':'warn');
}

async function deleteTx(id){
  if(!confirm('Hapus transaksi ini?')) return;

  renderPage('cashflow');
  await callSheet({action:'deleteTransaction',id});
}

function openAddBudgetCategory(bln,thn){
  const allNeedsCats = (STATE.config.kategori_needs||'').split(',').filter(Boolean);

  const allSavCats   = (STATE.config.kategori_savings||'').split(',').filter(Boolean);
  const allCats = [...allNeedsCats,...allWantsCats,...allSavCats];
  const existing = STATE.budget.filter(b=>b.bulan===bln&&b.tahun===thn).map(b=>b.kategori);

async function addBudgetCat(bln,thn){
  let kat = document.getElementById('bdg-newkat')?.value;
  if(kat==='__custom') kat = document.getElementById('bdg-customkat')?.value.trim();
  const nom = parseFloat(document.getElementById('bdg-newnom')?.value)||0;
  if(!kat||!nom){ showToast('modal-toast','Isi kategori dan alokasi.','err'); return; }
  const allN=(STATE.config.kategori_needs||'').split(',');
  const tipe=allN.includes(kat)?'Needs':((STATE.config.kategori_savings||'').split(',').includes(kat)?'Savings':'Wants');
  const existing=STATE.budget.findIndex(b=>b.bulan===bln&&b.tahun===thn&&b.kategori===kat);
  if(existing>-1) STATE.budget[existing].alokasi=nom;
  else STATE.budget.push({bulan:bln,tahun:thn,kategori:kat,tipe,alokasi:nom});
  closeModal(); renderPage('budget');
  await callSheet({action:'setBudget',bulan:bln,tahun:thn,kategori:kat,tipe,alokasi:nom});
}

function calcSellEst(maxLot, avgCost, isSahamInt){
  const mul   = isSahamInt===1 ? 100 : 1;
  const qty   = parseFloat(document.getElementById('sell-qty')?.value)||0;
  const harga = parseFloat(document.getElementById('sell-harga')?.value)||0;
  const fee   = parseFloat(document.getElementById('sell-fee')?.value)||0;
  const el    = document.getElementById('sell-est');
  if(!el) return;
  if(!qty||!harga){ el.style.display='none'; return; }
  const unitQty   = qty*mul;
  const proceeds  = unitQty*harga;
  const costBasis = unitQty*avgCost;
  const rpnl      = proceeds-costBasis-fee;
  el.style.display='block';
  document.getElementById('sell-est-inner').innerHTML=`
    <div><div style="color:var(--t3)">Proceeds</div><div style="font-family:var(--mono);color:var(--teal);font-weight:500">${fRp(proceeds)}</div></div>
    <div><div style="color:var(--t3)">Cost Basis</div><div style="font-family:var(--mono)">${fRp(costBasis)}</div></div>
    <div><div style="color:var(--t3)">Fee</div><div style="font-family:var(--mono)">${fRp(fee)}</div></div>
    <div><div style="color:var(--t3)">Realized P/L</div><div style="font-family:var(--mono);font-weight:600;color:${rpnl>=0?'var(--green)':'var(--rose)'}">${rpnl>=0?'+':''}${fRp(rpnl)}</div></div>`;
}

async function submitSell(kode, tipe, availableLot, avgCost){
  const isSaham  = tipe==='Saham';
  const mul      = isSaham ? 100 : 1;
  const tgl      = document.getElementById('sell-tgl')?.value;
  const qty      = parseFloat(document.getElementById('sell-qty')?.value)||0;
  const harga    = parseFloat(document.getElementById('sell-harga')?.value)||0;
  const fee      = parseFloat(document.getElementById('sell-fee')?.value)||0;
  const note     = document.getElementById('sell-note')?.value?.trim()||'';
  const doLogCF  = document.getElementById('sell-catat')?.checked;

  if(!tgl){ showToast('modal-toast','Isi tanggal jual.','err'); return; }
  if(qty<=0){ showToast('modal-toast','Qty harus lebih dari 0.','err'); return; }
  if(qty>availableLot+0.0001){ showToast('modal-toast','Qty melebihi posisi tersedia ('+availableLot+').','err'); return; }
  if(harga<=0){ showToast('modal-toast','Isi harga jual.','err'); return; }

  const fd       = fmtTgl(tgl);
  const unitQty  = qty*mul;
  const proceeds = unitQty*harga;
  const catatan  = 'JUAL|fee:'+Math.round(fee)+'|'+note;
  const sellRec  = {id:'sx'+Date.now(),tanggal:fd,kode,tipe,lotQty:qty,hargaBeli:harga,modal:Math.round(proceeds),catatan};
  STATE.investasi.push(sellRec);

  if(doLogCF){
    const d   = new Date(tgl);
    const bln = d.toLocaleString('id-ID',{month:'long'});
    const thn = d.getFullYear().toString();
    const netProceeds = Math.round(proceeds-fee);
    const txRec = {
      id:'tx'+Date.now(), tanggal:fd, tipe:'pemasukan',
      deskripsi:'Jual '+kode+' '+qty+(isSaham?' lot':'')+' @ '+fRp(harga),
      kategori:'Investasi', subkategori:'', nominal:netProceeds,
      akun:getRekening()[0]||'', bulan:bln, tahun:thn,
      catatan:'Auto-catat penjualan '+kode
    };
    STATE.transactions.push(txRec);
    callSheet({action:'addTransaction',...txRec}).catch(()=>{});
  }

  closeModal();
  if(tipe==='Saham') renderPage('saham');
  else renderPage('crypto');

  const ok = await callSheet({action:'addInvestasi',tanggal:fd,kode,tipe,lotQty:qty,hargaBeli:harga,modal:Math.round(proceeds),catatan});
  const toastId = tipe==='Saham'?'sh-toast':'cry-toast';
  showToast(toastId, ok.success?'✓ Penjualan '+kode+' tercatat!':'⚠ Tersimpan lokal', ok.success?'ok':'warn');
}

// ════════════════════════════════════════════════════════════
//  ACCOUNT MANAGEMENT (Dynamic) + Available Cash
// ════════════════════════════════════════════════════════════
function calcSaldoOtomatis(namaAkun){
  // Saldo otomatis = total pemasukan - pengeluaran - tabungan untuk akun ini (semua waktu)
  let saldo = 0;
  STATE.transactions.forEach(t=>{
    if(t.akun!==namaAkun) return;
    if(t.tipe==='pemasukan') saldo += t.nominal;
    else saldo -= t.nominal; // pengeluaran & tabungan kurangi saldo rekening
  });
  return saldo;
}

function getSaldoAkun(acc){
  // Kalau ada saldoManual (bukan null/undefined), pakai itu. Else hitung otomatis.
  if(acc.saldoManual!=null && acc.saldoManual!=='') return Number(acc.saldoManual);
  return calcSaldoOtomatis(acc.nama);
}

function calcAvailableCash(){
  return getAllAccounts().filter(a=>!a.disabled).reduce((sum,a)=>sum+getSaldoAkun(a),0);
}

// ── Commitments calc ────────────────────────────────────────
function calcCommitments(){
  // Hanya yang belum lunas (status != 'lunas')
  const pending = STATE.commitments.filter(c=>c.status!=='lunas');
  const total = pending.reduce((a,c)=>a+Number(c.nominal||0),0);
  return {pending, total, all:STATE.commitments};
}

function parseDueDate(raw){
  if(!raw) return null;
  const s = String(raw).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return new Date(s);
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){ const [d,m,y]=s.split('/'); return new Date(y,m-1,d); }
  const d=new Date(s); return isNaN(d.getTime())?null:d;
}

function daysUntil(raw){
  const d = parseDueDate(raw);
  if(!d) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.round((d-now)/(1000*60*60*24));
}

// ── Avg spending dari beberapa periode terakhir ─────────────
function calcAvgSpending(){
  // Ambil spending per periode finansial, rata-rata 3 periode terakhir yang ada datanya
  const byPeriode = {};
  STATE.transactions.forEach(t=>{
    if(t.tipe!=='pengeluaran') return;
    const key = (t.periodeBulan||t.bulan)+'|'+(t.periodeTahun||t.tahun);
    byPeriode[key] = (byPeriode[key]||0) + t.nominal;
  });
  const vals = Object.values(byPeriode).filter(v=>v>0);
  if(!vals.length) return 0;
  const last3 = vals.slice(-3);
  return last3.reduce((a,b)=>a+b,0)/last3.length;
}

    '</div>';
  }).join('<hr style="border:none;border-top:1px solid var(--border);margin:14px 0"/>');
}

async function addKategori(tipe){
  const inp = document.getElementById('kat-new-'+tipe);
  const val = inp?.value.trim();
  if(!val){ return; }
  const kats = getKategori(tipe);
  if(kats.some(k=>k.toLowerCase()===val.toLowerCase())){ showToast('kat-toast','Kategori sudah ada.','err'); return; }
  kats.push(val);
  await persistKategori(tipe, kats);
  document.getElementById('kategori-mgr').innerHTML = renderKategoriManager();
  showToast('kat-toast','✓ Kategori "'+val+'" ditambahkan','ok');
}

async function removeKategori(tipe, idx){
  const kats = getKategori(tipe);
  const removed = kats[idx];
  if(!confirm('Hapus kategori "'+removed+'"? Transaksi lama tetap tersimpan, hanya tidak muncul di pilihan baru.')) return;

  await persistKategori(tipe, kats);
  document.getElementById('kategori-mgr').innerHTML = renderKategoriManager();
  showToast('kat-toast','Kategori "'+removed+'" dihapus','ok');

async function persistKategori(tipe, kats){
  const key = getKatConfigKey(tipe);
  const val = kats.join(',');
  STATE.config[key] = val;
  await callSheet({action:'setConfig', key, value:val});
}

let snapFilter='daily';
function filterSnap(range,btn){
  snapFilter=range;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  renderGrowthChart();
}

// Aggregate snapshots by timeframe — ambil snapshot terakhir di tiap periode
function aggregateSnapshots(all,mode){
  if(mode==='daily') return all.slice(-90); // 90 hari terakhir biar tidak terlalu padat
  const buckets={};
  all.forEach(s=>{
    const d=new Date(s.date);
    let key;
    if(mode==='monthly')   key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
    else if(mode==='quarterly') key=d.getFullYear()+'-Q'+(Math.floor(d.getMonth()/3)+1);
    else if(mode==='yearly') key=String(d.getFullYear());
    else key=s.date;
    // simpan snapshot terakhir (tanggal terbesar) per bucket
    if(!buckets[key] || s.date>buckets[key].date) buckets[key]={...s,_key:key};
  });
  return Object.values(buckets).sort((a,b)=>a.date.localeCompare(b.date));
}

function fmtGrowthLabel(s,mode){
  const d=new Date(s.date);
  if(mode==='daily')     return d.toLocaleDateString('id-ID',{day:'numeric',month:'short'});
  if(mode==='monthly')   return d.toLocaleDateString('id-ID',{month:'short',year:'2-digit'});
  if(mode==='quarterly') return 'Q'+(Math.floor(d.getMonth()/3)+1)+' '+String(d.getFullYear()).slice(2);
  if(mode==='yearly')    return String(d.getFullYear());
  return s.date;
}

function renderGrowthChart(){
  const all = STATE.snapshots;
  const canvas = document.getElementById('ch-growth');
  const emptyEl= document.getElementById('growth-empty');
  const subEl  = document.getElementById('growth-sub');
  if(!canvas) return;
  if(!all.length){ if(emptyEl){emptyEl.style.display='block';canvas.style.display='none';} return; }
  if(emptyEl) emptyEl.style.display='none'; canvas.style.display='block';

  const data = aggregateSnapshots(all,snapFilter);
  if(!data.length) return;

  // Update subtitle + hitung growth periode
  const subMap={daily:'harian',monthly:'bulanan',quarterly:'kuartalan',yearly:'tahunan'};
  if(subEl){
    let growthTxt='';
    if(data.length>1){
      const first=data[0].netWorth, last=data[data.length-1].netWorth;
      const chg=last-first; const pct=first>0?chg/first*100:0;
      growthTxt=' · '+(chg>=0?'+':'')+fPct(pct)+' ('+(chg>=0?'+':'')+fRp(chg)+')';
    }
    subEl.textContent='Pertumbuhan net worth — '+subMap[snapFilter]+growthTxt;
  }

  const ctx=canvas.getContext('2d');
  if(CHARTS.growth) CHARTS.growth.destroy();
  const grad=ctx.createLinearGradient(0,0,0,260);
  grad.addColorStop(0,'rgba(212,168,75,.15)'); grad.addColorStop(1,'rgba(212,168,75,0)');
  const isBar = (snapFilter==='quarterly'||snapFilter==='yearly');
  CHARTS.growth=new Chart(ctx,{
    type: isBar?'bar':'line',
    data:{labels:data.map(s=>fmtGrowthLabel(s,snapFilter)),
      datasets:[
        {label:'Net Worth',data:data.map(s=>s.netWorth),borderColor:'#d4a84b',backgroundColor:isBar?'rgba(212,168,75,.6)':grad,borderWidth:2.5,borderRadius:isBar?6:0,pointRadius:isBar?0:(data.length>60?0:3),tension:.35,fill:!isBar},
        ...(isBar?[]:[{label:'Investasi',data:data.map(s=>s.totalInvestasi||s.totalInv||0),borderColor:'rgba(45,212,191,.5)',backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:.35,borderDash:[5,4]}])
      ]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#8892a4',font:{size:11},padding:16}},tooltip:{callbacks:{label:ctx=>ctx.dataset.label+': '+fRp(ctx.raw)}}},
      scales:{x:{ticks:{color:'#4a5268',maxTicksLimit:12,font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},
              y:{ticks:{color:'#4a5268',callback:v=>'Rp'+Math.round(v/1e6)+'jt'},grid:{color:'rgba(255,255,255,.04)'}}}}
  });
}

function renderCashflowChart(){
  const ctx=document.getElementById('ch-cashflow')?.getContext('2d');
  if(!ctx) return;
  const months=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  const thn=nowYear();
  const incomeData=months.map((_,i)=>{
    const bln=new Date(0,i).toLocaleString('id-ID',{month:'long'});
    return STATE.transactions.filter(t=>t.tahun===thn&&t.bulan===bln&&t.tipe==='pemasukan').reduce((a,t)=>a+t.nominal,0);
  });
  const spendData=months.map((_,i)=>{
    const bln=new Date(0,i).toLocaleString('id-ID',{month:'long'});
    return STATE.transactions.filter(t=>t.tahun===thn&&t.bulan===bln&&t.tipe==='pengeluaran').reduce((a,t)=>a+t.nominal,0);
  });
  if(CHARTS.cashflow) CHARTS.cashflow.destroy();
  CHARTS.cashflow=new Chart(ctx,{
    type:'bar',
    data:{labels:months,datasets:[
      {label:'Income',data:incomeData,backgroundColor:'rgba(74,222,128,.5)',borderColor:'#4ade80',borderWidth:1,borderRadius:4},
      {label:'Spending',data:spendData,backgroundColor:'rgba(251,113,133,.5)',borderColor:'#fb7185',borderWidth:1,borderRadius:4}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8892a4',font:{size:11}}}},
      scales:{x:{ticks:{color:'#4a5268',font:{size:10}},grid:{display:false}},
              y:{ticks:{color:'#4a5268',callback:v=>Math.round(v/1e6)+'jt'},grid:{color:'rgba(255,255,255,.04)'}}}}
  });
}

function renderOverviewAlloc(){
  const ctx=document.getElementById('ch-ov-alloc')?.getContext('2d');
  if(!ctx) return;
  const {segs,total}=calcAssetAllocation();
  if(!segs.length) return;

    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',

function renderAllocChart(){
  const ctx=document.getElementById('ch-alloc')?.getContext('2d');
  if(!ctx) return;
  const dca=calcDCA(); const port=calcPortfolio();
  const segs=[
    {label:'BTC DCA',val:dca.cur||dca.inv,color:'#d4a84b'},
    ...port.map(p=>({label:p.kode,val:p.cur||p.modal,color:'#2dd4bf'})),
    {label:'Aset',val:STATE.aset.reduce((a,x)=>a+(x.nilaiSaatIni||x.modal),0),color:'#a78bfa'}

  CHARTS.alloc=new Chart(ctx,{
    type:'doughnut',
    data:{labels:segs.map(s=>s.label),datasets:[{data:segs.map(s=>s.val),backgroundColor:segs.map(s=>s.color),borderWidth:2,borderColor:'#0e1014'}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'right',labels:{color:'#8892a4',font:{size:11},padding:10}}}}
  });
}

function renderDcaChart(){
  const ctx=document.getElementById('ch-dca')?.getContext('2d');
  if(!ctx) return;
  let cumInv=0,cumQty=0;
  const labels=[],avgLine=[],marketLine=[];
  STATE.btcDca.forEach(t=>{ cumInv+=t.beli; cumQty+=t.beli/t.harga; labels.push(t.tanggal); avgLine.push(Math.round(cumInv/cumQty)); marketLine.push(t.harga); });
  if(CHARTS.dca) CHARTS.dca.destroy();
  CHARTS.dca=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[
      {label:'Avg beli',data:avgLine,borderColor:'#d4a84b',backgroundColor:'rgba(212,168,75,.08)',borderWidth:2,pointRadius:0,tension:.3,fill:true},
      {label:'Harga saat beli',data:marketLine,borderColor:'rgba(167,139,250,.6)',backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:.3,borderDash:[4,4]}
    ]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{labels:{color:'#8892a4',font:{size:11}}}},
      scales:{x:{ticks:{color:'#4a5268',maxTicksLimit:8,font:{size:10}},grid:{color:'rgba(255,255,255,.04)'}},
              y:{ticks:{color:'#4a5268',callback:v=>'Rp'+Math.round(v/1e6)+'jt'},grid:{color:'rgba(255,255,255,.04)'}}}}
  });
}

function renderAllCharts(){
  renderGrowthChart();
  renderCashflowChart();
  renderAllocChart();
  renderDcaChart();
}

async function refreshAll(){
  const btns=[document.getElementById('btn-refresh'),document.getElementById('btn-refresh-mob')];
  btns.forEach(b=>{ if(b){b.disabled=true;b.innerHTML='<i class="ti ti-loader-2" style="animation:spin .7s linear infinite"></i>';}});
  try{
    await Promise.all([loadSheet(), fetchBtcPrice(), fetchSahamPrices()]);
    saveSnapshot();
    renderPage(CURR_PAGE);
    updateLastUpd();
  }finally{
    btns.forEach(b=>{ if(b){b.disabled=false;b.innerHTML=b.id==='btn-refresh'?'<i class="ti ti-refresh"></i> Refresh':'<i class="ti ti-refresh"></i>';}});
  }
}

async function doLogin(){
  const pass = document.getElementById('l-pass').value;
  if(!pass){ showLoginErr('Masukkan password.'); return; }
  document.getElementById('l-btn').textContent='Checking...';
  const stored = lsg(K.PASS)||'fintrack2024';
  if(pass===stored){ loginOk(); return; }
  try{
    const r=await fetch(`${WEB_URL}?action=checkAuth&pass=${encodeURIComponent(pass)}`,{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    if(d.ok){ lss(K.PASS,pass); loginOk(); return; }
  }catch(e){}
  showLoginErr('Password salah.');
  document.getElementById('l-btn').textContent='Masuk ›';
}

function showLoginErr(msg){
  const el=document.getElementById('l-err');
  el.textContent=msg; el.style.display='block';
  document.getElementById('l-btn').textContent='Masuk ›';
}

function loginOk(){
  lssj(K.SESS,{ts:Date.now()});
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  STATE.snapshots = lsgj(K.SNAP,[]);
  STATE.btcDca = [...BASE_DCA.map((t,i)=>({...t,id:'b'+i,_base:true}))];
  renderPage('overview');
  refreshAll();
}

function doLogout(){
  localStorage.removeItem(K.SESS);
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('l-pass').value='';
  document.getElementById('l-err').style.display='none';
  document.getElementById('l-btn').textContent='Masuk ›';
}

//  BOOT
// ════════════════════════════════════════════════════════════
document.getElementById('l-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

(function(){
  const sess = lsgj(K.SESS,null);
  if(sess?.ts&&(Date.now()-sess.ts)<7*24*60*60*1000){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    STATE.snapshots = lsgj(K.SNAP,[]);
    STATE.btcDca = [...BASE_DCA.map((t,i)=>({...t,id:'b'+i,_base:true}))];
    renderPage('overview');
    refreshAll();
  }
})();
